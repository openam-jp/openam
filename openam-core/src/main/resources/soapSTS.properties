deployment_custom_service_port.help.txt=Example: {http://docs.oasis-open.org/ws-sx/ws-trust/200512/}service_port_name
deployment_wsdl_location=Wsdl File Referencing Security Policy Binding Selection
deployment_wsdl_location.help=Choose the SupportingToken type and corresponding SecurityPolicy binding which will \
  protect your sts instance. This choice will determine the SecurityPolicy bindings in the wsdl file defining the WS-Trust API
deployment_wsdl_location.help.txt=Note that the SupportingToken type selected must correspond to the Security Policy \
  Validated Token selection. Note if a custom wsdl file is chose, the user is responsible for providing a \
  propertly formatted wsdl file. See documentation for details.
ut_transport_wsdl=Username tokens over the transport binding
ut_symmetric_wsdl=Username tokens over the symmetric binding
ut_asymmetric_wsdl=Username tokens over the asymmetric binding
openam_transport_wsdl=OpenAM session tokens over the transport binding
openam_bare_wsdl=OpenAM session tokens in the clear
x509_asymmetric_wsdl=x509 Certificates over the asymmetric binding
x509_symmetric_wsdl=x509 Certificates over the symmetric binding
custom_wsdl_file=Custom wsdl file
deployment_custom_wsdl_location=Custom wsdl File (optional)
deployment_custom_wsdl_location.help=The location (on soap-sts .war accessable filesystem or soap-sts .war classpath) of the custom wsdl file.
deployment_custom_wsdl_location.help.txt=If the signing and/or encryption of the request and/or response messages \
  specified in the SecurityPolicy bindings of standard soap-sts wdsl files must be customized, specify the name of the \
  customized wsdl file here. See documentation for additional details.
deployment_am_url=Url of OpenAM
deployment_am_url.help=Set to Url of the OpenAM instance or site deployment.
deployment_am_url.help.txt=The OpenAM deployment will be consulted for published soap-sts instances, and to authenticate \
  and issue tokens.
deployment_auth_target_mappings=Authentication Target Mappings
deployment_auth_target_mappings.help=Configuration of consumption of OpenAM's rest-authN
deployment_auth_target_mappings.help.txt=Each deployed STS is configured with the authentication targets for each \
  input token type for each supported token transformation. For example, if the transformation \
  OPENIDCONNECT->SAML2 is supported, the STS instance must be configured with information specifying which elements of \
  the OpenAM restful authentication context needs to be consumed to validate the OPENIDCONNECT token. The elements of the \
  configuration tuple are separated by '|'. The first element is the input token type in the token transform: i.e. \
  X509, OPENIDCONNECT, USERNAME, or OPENAM. The second element is the authentication target - i.e. either 'module' \
  or 'service', and the third element is the name of the authentication module or service. The fourth (optional) element provides \
  the STS authentication context information about the to-be-consumed authentication context. When transforming OpenID Connect \
  Id tokens, the OpenID Connect authentication module must be consumed, and thus a deployed rest-sts instance must be configured \
  with the name of the header/cookie element where the OpenID Connect \
  Id token will be placed. For this example, the following string would define these configurations: \
  OPENIDCONNECT|module|oidc|oidc_id_token_auth_target_header_key=oidc_id_token. In this case, 'oidc' is the name of the \
  OpenID Connect authentication module created to authenticate OpenID Connect tokens. When transforming a X509 Certificate, \
  the Certificate module must be consumed, and the published rest-sts instance must be configured with the name of the \
  Certificate module (or the service containing the module), and the header name configured for the Certificate module \
  corresponding to where the Certificate module can expect to find the to-be-validated Certificate. The following string \
  would define these configurations: X509|module|cert_module|x509_token_auth_target_header_key=client_cert. In this \
  case 'cert_module' is the name of the Certificate module, and client_cert is the header name where Certificate module \
  has been configured to find the client's Certificate.
delegation_relationship_supported=Delegation Relationships Supported
delegation_relationship_supported.help=Check if the RST will include ActAs/OnBehalfOf token elements
delegation_relationship_supported.help.txt=If SAML2 assertions with SenderVouches SubjectConfirmation \
  are to be issued, this box must be checked.
delegation_validated_token_types=Delegated Token Types (optional)
delegation_validated_token_types.help=If delegation relationships are supported, out-of-the-box validation support \
  for the validation of username and OpenAM session tokens included as the ActAs/OnBehalfOf element is configured here.
delegation_validated_token_types.help.txt=If a value is selected in this list, then no Custom Delegation Handlers \
  must be specified. The true/false value indicates whether the the interim OpenAM session, \
  created as part of delegated token validation, should be invalidated following token creation.
delegation_validated_token_types_unt_true=USERNAME;invalidate interim OpenAM session
delegation_validated_token_types_unt_false=USERNAME;don't invalidate interim OpenAM session
delegation_validated_token_types_openam_true=OPENAM;invalidate this session
delegation_validated_token_types_openam_false=OPENAM;don't invalidate this session
delegation_custom_token_handlers=Custom Delegation Handlers (optional)
delegation_custom_token_handlers.help=If delegation relationships are supported, the class names soap-sts .war \
   file classpath resident implementations of the org.apache.cxf.sts.token.delegation.TokenDelegationHandler interface \
   can be specified here.
delegation_custom_token_handlers.help.txt=Custom TokenDelegationHandler implementations will be invoked to validate \
  the potentially custom token element included in the ActAs/OnBehalfOf \
  element in the RequestSecurityToken invocation. Note that a TokenDelegationHandler does not need to be supplied to \
  validate username or OpenAM session tokens. The validation of these tokens are supported out-of-the-box by selecting them \
  in the Delegated Token Types list.

# SOAP Keystore Configuration
soap_keystore_filename=SOAP Keystore Location
soap_keystore_filename.help=The location of the keystore which contains the key state necessary for the CXF and WSS4j \
  runtime to enforce the SecurityPolicy bindings associated with this STS instance.
soap_keystore_password=Keystore Password
soap_signature_key_alias=Signature Key Alias
soap_signature_key_alias.help=Alias of key used to sign messages from STS. Necessary for asymmetric binding.
soap_signature_key_password=Signature Key Password
soap_encryption_key_alias=Decryption Key Alias
soap_encryption_key_alias.help=Alias of key used by the STS to decrypt client messages in the asymmetric \
   binding, and to decrypt the client-generated symmetric key in the symmetric binding. Corresponds to an STS PrivateKeyEntry.
soap_encryption_key_password=Decryption Key Password

# Issued SAML2 Token Configuration
saml2_name_id_format=NameIdFormat
issuer_name=The SAML2 issuer Id
issuer_name.help=Will appear in the Issuer element of issued SAML2 assertions
saml2_token_lifetime_seconds=Token Lifetime (Seconds)
saml2_custom_conditions_provider_class_name=Custom Conditions Provider Class Name (optional)
saml2_custom_conditions_provider_class_name.help=If the Conditions of the issued SAML2 assertion \
  need to be customized, implement the <code>org.forgerock.openam.sts.tokengeneration.saml2.statements.ConditionsProvider</code> \
  interface, and specify the class name of the implementation here.
saml2_custom_subject_provider_class_name=Customs Subject Provider Class Name (optional)
