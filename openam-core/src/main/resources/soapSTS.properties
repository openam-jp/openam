#This file defines the I18N Keys referenced in soapSTS.xml.
soap_security_token_service_description=SOAP Security Token Service

# General Configuration
persist_issued_tokens_in_cts=Persist Issued Tokens in Core Token Store
persist_issued_tokens_in_cts.help=Necessary to support token validation and cancellation
persist_issued_tokens_in_cts.help.txt=Validation of STS-issued tokens will involve determining whether the token \
  has been issued, has not expired, and has not been cancelled. Token cancellation involves removing the record of this \
  token from the CTS. Thus CTS persistence of STS-issued tokens is required to support these features.
issued_token_types=Issued Tokens
issued_token_types.help=Determines which tokens this soap STS instance will issue.
validated_token_config=Security Policy Validated Token
validated_token_config.help=Determines the SupportingToken type in the WS-SecurityPolicy bindings \
  in the soap STS' wsdl, and whether the interim OpenAM session resulting from successful SupportingToken validation, should \
  be invalidated following token issue.
validated_token_config_openam_true=OPENAM;invalidate this session
validated_token_config_openam_false=OPENAM;don't invalidate this session
validated_token_config_unt_true=USERNAME;invalidate interim OpenAM session
validated_token_config_unt_false=USERNAME;don't invalidate interim OpenAM session
validated_token_config_x509_true=X509;invalidate interim OpenAM session
validated_token_config_x509_false=X509;don't invalidate interim OpenAM session

