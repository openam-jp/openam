#This file defines the I18N Keys referenced in restSTS.xml.
rest_security_token_service_description=REST Security Token Service

# General Configuration
persist_issued_tokens_in_cts=Persist Issued Tokens in Core Token Store
persist_issued_tokens_in_cts.help=Necessary to support token validation and cancellation
persist_issued_tokens_in_cts.help.txt=Validation of STS-issued tokens will involve determining whether the token \
  has been issued, has not expired, and has not been cancelled. Token cancellation involves removing the record of this \
  token from the CTS. Thus CTS persistence of STS-issued tokens is required to support these features.
supported_token_transforms=Supported Token Transforms
supported_token_transforms.help=Supported token transformations
supported_token_transforms.help.txt=In X->Y, X refers to the input token type, and Y refers to the output token type \
  (currently limited to SAML2). The (don't) invalidate interim OpenAM session specifies whether the interim OpenAM session, \
  created during the authentication of the presented input token type, should be invalidated following the creation of the \
  output token type.
supported_token_transforms_unt_saml2_true=UNT->SAML2;invalidate interim OpenAM session
supported_token_transforms_unt_saml2_false=UNT->SAML2;don't invalidate interim OpenAM session
supported_token_transforms_oidc_saml2_true=OPENIDCONNECT->SAML2;invalidate interim OpenAM session
supported_token_transforms_oidc_saml2_false=OPENIDCONNECT->SAML2;don't invalidate interim OpenAM session
supported_token_transforms_openam_saml2_true=OPENAM->SAML2;invalidate interim OpenAM session
supported_token_transforms_openam_saml2_false=OPENAM->SAML2;don't invalidate interim OpenAM session
supported_token_transforms_x509_saml2_true=x509->SAML2;invalidate interim OpenAM session
supported_token_transforms_x509_saml2_false=x509->SAML2;don't invalidate interim OpenAM session
supported_token_transforms_unt_oidc_true=USERNAME->OPENIDCONNECT;invalidate interim OpenAM session
supported_token_transforms_unt_oidc_false=USERNAME->OPENIDCONNECT;don't invalidate interim OpenAM session
supported_token_transforms_oidc_oidc_true=OPENIDCONNECT->OPENIDCONNECT;invalidate interim OpenAM session
supported_token_transforms_oidc_oidc_false=OPENIDCONNECT->OPENIDCONNECT;don't invalidate interim OpenAM session
supported_token_transforms_openam_oidc_true=OPENAM->OPENIDCONNECT;invalidate interim OpenAM session
supported_token_transforms_openam_oidc_false=OPENAM->OPENIDCONNECT;don't invalidate interim OpenAM session
supported_token_transforms_x509_oidc_true=X509->OPENIDCONNECT;invalidate interim OpenAM session
supported_token_transforms_x509_oidc_false=X509->OPENIDCONNECT;don't invalidate interim OpenAM session
custom_token_validators=Custom Token Validators (optional)
custom_token_validators.help=If validator of a custom token type is desired, specify the name of the custom token \
  here, followed by '|', followed by the class name of the org.forgerock.openam.sts.rest.token.validator.RestTokenTransformValidator \
  implementation which will be invoked to validate the custom tokens.
custom_token_validators.help.txt=Example: MY_CUSTOM_INPUT_TOKEN|org.mycompany.tokens.MyCustomTokenValidator \
  Note that MY_CUSTOM_INPUT_TOKEN would then be specified as the value corresponding to the token_type key in the input_token_state \
  json object specified in rest-sts token transformation invocations.
custom_token_providers=Custom Token Providers (optional)
custom_token_providers.help=If a rest-sts instance is to produce a custom token, specify the name of the custom token \
  here, followed by '|', followed by the class name of the org.forgerock.openam.sts.rest.token.provider.RestTokenProvider \
  implementation which will be invoked to produce an instance of the custom token.
custom_token_providers.help.txt=Example: MY_CUSTOM_OUTPUT_TOKEN|org.mycompany.tokens.MyCustomTokenProvider \
  Note that MY_CUSTOM_OUTPUT_TOKEN would then be specified as the value corresponding to the token_type key in the output_token_state \
  json object specified in rest-sts token transformation invocations.
custom_token_transforms=Custom Token Transforms (optional)
custom_token_transforms.help=If either custom token validators or providers are specified, they must also be specified \
  in a custom rest-sts token transformation. These input or output tokens can be specified in a transformation with standard, \
  or other custom, tokens.
custom_token_transforms.help.txt=The format of these token transformation definitions is the same as the standard \
  token transformation definitions. The first field defines the input token type, the second the output token type, and the \
  third field specifies whether the OpenAM session, produced as part of the validation of the input token type, is invalidated \
  following the production of the output token. Example 1: MY_CUSTOM_INPUT_TOKEN|SAML2|true \
  Example 1 specifies a MY_CUSTOM_INPUT_TOKEN as the input token (requires the specification of a custom token validator) \
  SAML2 as the produced token, and that the interim OpenAM Session should be invalidated after the SAML2 token is produces. \
  Example 2: OPENIDCONNECT|MY_CUSTOM_OUTPUT_TOKEN|true Example 2 specifies that an OPENIDCONNECT token should be authenticated to assert \
  the identity of a token of type MY_CUSTOM_OUTPUT_TOKEN (requires the specification of a custom token provider) and that the \
  interim OpenAM Session should be invalidated. Example 3: MY_CUSTOM_INPUT_TOKEN|MY_CUSTOM_OUTPUT_TOKEN|false Example 3 specifies \
  that a MY_CUSTOM_INPUT_TOKEN should be transformed into a MY_CUSTOM_OUTPUT_TOKEN (requires the specification of both a custom \
  provider and a custom validator), and that the interim OpenAM session should not be invalidated.

# Deployment Configuration
deployment_auth_target_mappings=Authentication Target Mappings
deployment_auth_target_mappings.help=Configuration of consumption of OpenAM's rest-authN
deployment_auth_target_mappings.help.txt=Each deployed STS is configured with the authentication targets for each \
  input token type for each supported token transformation. For example, if the transformation \
  OPENIDCONNECT->SAML2 is supported, the STS instance must be configured with information specifying which elements of \
  the OpenAM restful authentication context needs to be consumed to validate the OPENIDCONNECT token. The elements of the \
  configuration tuple are separated by '|'. The first element is the input token type in the token transform: i.e. \
  X509, OPENIDCONNECT, USERNAME, or OPENAM. The second element is the authentication target - i.e. either 'module' \
  or 'service', and the third element is the name of the authentication module or service. The fourth (optional) element provides \
  the STS authentication context information about the to-be-consumed authentication context. When transforming OpenID Connect \
  Id tokens, the OpenID Connect authentication module must be consumed, and thus a deployed rest-sts instance must be configured \
  with the name of the header/cookie element where the OpenID Connect \
  Id token will be placed. For this example, the following string would define these configurations: \
  OPENIDCONNECT|module|oidc|oidc_id_token_auth_target_header_key=oidc_id_token. In this case, 'oidc' is the name of the \
  OpenID Connect authentication module created to authenticate OpenID Connect tokens. When transforming a X509 Certificate, \
  the Certificate module must be consumed, and the published rest-sts instance must be configured with the name of the \
  Certificate module (or the service containing the module), and the header name configured for the Certificate module \
  corresponding to where the Certificate module can expect to find the to-be-validated Certificate. The following string \
  would define these configurations: X509|module|cert_module|x509_token_auth_target_header_key=client_cert. In this \
  case 'cert_module' is the name of the Certificate module, and client_cert is the header name where Certificate module \
  has been configured to find the client's Certificate.
deployment_offloaded_two_way_tls_header_key=Client Certificate Header Key
deployment_offloaded_two_way_tls_header_key.help=TLS-offload host certificate header key
deployment_offloaded_two_way_tls_header_key.help.txt=Token transformation which take X509 Certificates as the input token require that \
  the X509 Certificate be presented via two-way TLS, so that the TLS handshake can validate client certificate ownership. \
  A standard means of obtaining the client certificate presented via two-way TLS is via the javax.servlet.request.X509Certificate \
  attribute in the ServletRequest. However, in TLS-offloaded deployments, the TLS-offloader must communicate the client \
  certificate to its ultimate destination via an Http header. If this rest-sts instance is to support token transformations \
  with X509 Certificate input, and OpenAM will be deployed in a TLS-offloaded context, then this value must be set to the \
  header value which the TLS-offloading engine will use to set client certificates presented via the TLS handshake.
deployment_tls_offload_engine_hosts=Trusted Remote Hosts
deployment_tls_offload_engine_hosts.help=IP addresses of TLS-offload hosts
deployment_tls_offload_engine_hosts.help.txt=Token transformation which take X509 Certificates as the input token require that \
  the X509 Certificate be presented via two-way TLS, so that the TLS handshake can validate client certificate ownership. \
  If OpenAM is deployed in a TLS-offloaded environment, in which the TLS-offloader must communicate the client certificate \
  to the rest-sts via an Http header, this certificate will only be accepted if the ip address(es) of the TLS-offload engines \
  are specified in this list. Specify 'any' if a client certificate can be presented in the specified header by any rest-sts \
  client.

# Issued SAML2 Token Configuration
saml2_name_id_format=NameIdFormat
issuer_name=The SAML2 issuer Id
issuer_name.help=Will appear in the Issuer element of issued SAML2 assertions
saml2_token_lifetime_seconds=Token Lifetime (Seconds)
saml2_custom_conditions_provider_class_name=Custom Conditions Provider Class Name (optional)
saml2_custom_conditions_provider_class_name.help=If the Conditions of the issued SAML2 assertion \
  need to be customized, implement the <code>org.forgerock.openam.sts.tokengeneration.saml2.statements.ConditionsProvider</code> \
  interface, and specify the class name of the implementation here.
saml2_custom_subject_provider_class_name=Customs Subject Provider Class Name (optional)
saml2_custom_subject_provider_class_name.help=If the Subject of the issued SAML2 assertion \
  needs to be customized, implement the <code>org.forgerock.openam.sts.tokengeneration.saml2.statements.SubjectProvider</code> \
  interface, and specify the class name of the implementation here.
saml2_custom_authentication_statements_provider_class_name=Custom AuthenticationStatements Class Name (optional)
saml2_custom_authentication_statements_provider_class_name.help=If the AuthenticationStatements of the issued SAML2 assertion \
  need to be customized, implement the <code>org.forgerock.openam.sts.tokengeneration.saml2.statements.AuthenticationStatementsProvider</code> \
  interface, and specify the class name of the implementation here.
saml2_custom_attribute_statements_provider_class_name=Custom AttributeStatements Class Name (optional)
saml2_custom_attribute_statements_provider_class_name.help=If the AttributeStatements of the issued SAML2 assertion \
  need to be customized, implement the <code>org.forgerock.openam.sts.tokengeneration.saml2.statements.AttributeStatementsProvider</code> \
  interface, and specify the class name of the implementation here.
saml2_custom_authz_decision_statements_provider_class_name=Custom Authorization Decision Statements Class Name (optional)
saml2_custom_authz_decision_statements_provider_class_name.help=If the AuthorizationDecisionStatements of the issued SAML2 assertion \
  need to be customized, implement the <code>org.forgerock.openam.sts.tokengeneration.saml2.statements.AuthzDecisionStatementsProvider</code> \
  interface, and specify the class name of the implementation here.
saml2_custom_attribute_mapper_class_name=Custom Attribute Mapper Class Name (optional)
saml2_custom_attribute_mapper_class_name.help=If the class implementing attribute mapping for attributes \
  contained in the issued SAML2 assertion needs to be customized, implement the \
  <code>org.forgerock.openam.sts.tokengeneration.saml2.statements.AttributeMapper</code> interface, and specify the class name of \
  the implementation here.
saml2_custom_authn_context_mapper_class_name=Custom Authentication Context Class Name (optional)
saml2_custom_authn_context_mapper_class_name.help=If the AuthnContext mapping implemented by the \
  <code>org.forgerock.openam.sts.rest.token.provider.saml.DefaultSaml2JsonTokenAuthnContextMapper</code> class needs \
  to be customized, implement the <code>org.forgerock.openam.sts.rest.token.provider.saml.Saml2JsonTokenAuthnContextMapper</code> \
  interface, and specify the name of the implementation here.
saml2_sign_assertion=Sign Assertion
saml2_sp_entity_id=Service Provider Entity Id
saml2_sp_entity_id.help=Values will be used to populate the Audiences of the AudienceRestriction \
  element of the Conditions element. This value is required when issuing Bearer assertions. See section 4.1.4.2 of \
  <a href="http://docs.oasis-open.org/security/saml/v2.0/saml-profiles-2.0-os.pdf" target="_blank">\
  Profiles for the OASIS Security Assertion Markup Language (SAML) V2.0</a> for details.
saml2_sp_acs_url=Service Provider Assertion Consumer Service Url
saml2_sp_acs_url.help=When issuing bearer assertions, the recipient attribute \
   of the SubjectConfirmation element must be set to the Service Provider Assertion Consumer Service Url. See section \
  4.1.4.2 of <a href="http://docs.oasis-open.org/security/saml/v2.0/saml-profiles-2.0-os.pdf" target="_blank">\
  Profiles for the OASIS Security Assertion Markup Language (SAML) V2.0</a> for details. Value required when \
  issuing Bearer assertions.
saml2_encrypt_attributes=Encrypt Attributes
saml2_encrypt_attributes.help=Check this box if the assertion Attributes should be encrypted. If this box is \
  checked, the Encrypt Assertion box cannot be checked.
saml2_encrypt_assertion=Encrypt Assertion
saml2_encrypt_assertion.help=Check this box if the entire assertion should be encrypted. If this box is checked, \
  the Encrypt NameID and Encrypt Attributes boxes cannot be checked.
saml2_encrypt_nameid=Encrypt NameID
saml2_encrypt_nameid.help=Check this box if the assertion NameID should be encrypted. If this box is checked, \
  the Encrypt Assertion box cannot be checked.
saml2_encryption_algorithm=Encryption Algorithm
saml2_encryption_algorithm.help=Algorithm used to encrypt generated assertions.
saml2_encryption_algorithm_aes_128=http://www.w3.org/2001/04/xmlenc#aes128-cbc
saml2_encryption_algorithm_aes_192=http://www.w3.org/2001/04/xmlenc#aes192-cbc
saml2_encryption_algorithm_aes_256=http://www.w3.org/2001/04/xmlenc#aes256-cbc
saml2_keystore_filename=KeystorePath
saml2_keystore_filename.help=Path to keystore
saml2_keystore_filename.help.txt=Provide either the full filesystem path to a filesystem resident keystore, or a \
  classpath-relative path to a keystore bundled in the OpenAM .war file. This keystore contains the IdP public/private \
  keys and SP public key for signed and/or encrypted assertions. If assertions are neither signed nor encrypted, these \
  values need not be specified.
saml2_keystore_password=Keystore Password
saml2_encryption_key_alias=Encryption Key Alias
saml2_encryption_key_alias.help=This alias corresponds to the SP's x509 Certificate identified by the \
  SP Entity ID for this rest-sts instance. Not necessary unless assertions are to be encrypted.
saml2_signature_key_alias=Signature Key Alias
saml2_signature_key_alias.help=Corresponds to the private key of the IdP. Will be used to sign assertions. \
  Value can remain unspecified unless assertions are signed.
saml2_signature_key_password=Signature Key Password
saml2_attribute_map=Attribute Mappings
saml2_attribute_map.help=Contains the mapping of assertion attribute names (Map keys) to local OpenAM attributes (Map values) in \
  configured data stores. Format: assertion_attr_name=ldap_attr_name
saml2_attribute_map.help.txt= The DefaultAttributeMapper looks at profile attributes in \
  configured data stores, or in Session properties. The keys will define the name of the attributes \
  included in the Assertion Attribute statements, and the data pulled from the subject's directory entry or session state \
  corresponding to the map value will define the value corresponding to this attribute name. The keys can have the format \
  [NameFomatURI|]SAML ATTRIBUTE NAME. If the attribute value is \
  enclosed in quotes, that quoted value will be included in the attribute without mapping. Binary attributes should be \
  followed by ';binary'. Examples: EmailAddress=mail, Address=postaladdress, \
  urn:oasis:names:tc:SAML:2.0:attrname-format:uri|urn:mace:dir:attribute-def:cn=cn, partnerID="staticPartnerIDValue", \
  urn:oasis:names:tc:SAML:2.0:attrname-format:uri|nameID="staticNameIDValue", photo=photo;binary, \
  urn:oasis:names:tc:SAML:2.0:attrname-format:uri|photo=photo;binary

# OpenIdConnect Token Configuration
oidc_issuer=The id of the OpenIdConnect Token Provider
oidc_issuer.help=Value corresponding to iss claim
oidc_token_lifetime_seconds=Token Lifetime (Seconds)
oidc_signature_algorithm=Token signature algorithm
oidc_signature_algorithm.help=Algorithm used to sign issued OIDC tokens
oidc_signature_algorithm_hmac_sha_256=HMAC SHA 256
oidc_signature_algorithm_hmac_sha_384=HMAC SHA 384
oidc_signature_algorithm_hmac_sha_512=HMAC SHA 512
oidc_signature_algorithm_rsa_sha_256=RSA SHA 256
oidc_public_key_reference_type=Public key reference type
oidc_public_key_reference_type.help=For tokens signed with RSA, how should corresponding public key be referenced in the issued jwt
oidc_signature_verification_reference_type_none=NONE
oidc_signature_verification_reference_type_jwk=JWK
oidc_keystore_location=KeyStore Location
oidc_keystore_location.help=For RSA-signed tokens, the filesystem or classpath location of the KeyStore containing singing key entry
oidc_keystore_location.help.txt=For RSA-signed tokens, the KeyStore location, password, signing-key alias, and signing key \
  password must be specified. The client secret is not required for RSA-signed tokens.
oidc_keystore_password=KeyStore password
oidc_signature_key_alias=KeyStore signing key alias
oidc_signature_key_alias.help=For RSA-signed tokens, corresponds to the private key of the OIDC OP. Will be used to sign assertions.
oidc_signature_key_password=Signature key password
oidc_client_secret=Client secret
oidc_client_secret.help=For HMAC-signed tokens, the client secret used as the HMAC key
oidc_client_secret.help.txt=For HMAC-signed tokens, the KeyStore location, password, gignature key alias and \
  password configurations are not required.
oidc_audience=The audience for issued tokens
oidc_audience.help=Contents will be set in the aud claim
oidc_authorized_party=The authorized party (optional)
oidc_authorized_party.help=Optional. Will be set in the azp claim
oidc_attribute_map=Claim map
oidc_attribute_map.help=Contains the mapping of OIDC token claim names (Map keys) to local OpenAM attributes (Map values) \
  in configured data stores.Format: claim_name=attribute_name
oidc_attribute_map.help.txt= The keys in the map will be claim entries in the issued OIDC token, and the \
  value of these claims will be the principal attribute state resulting from LDAP datastore lookup of the map values. \
  If no values are returned from the the LDAP datastore lookup of the attribute corresponding to the map value, \
  no claim will be set in the issued OIDC token.
oidc_custom_claim_mapper_class=Custom claim mapper class (optional)
oidc_custom_claim_mapper_class.help=If the class implementing attribute mapping for attributes contained in \
  issued OpenIdConnect tokens needs to be customized, implement the \
  <code>org.forgerock.openam.sts.tokengeneration.oidc.OpenIdConnectTokenClaimMapper</code> interface, and specify the class name of \
  the implementation here.
oidc_custom_authn_context_mapper_class=Custom authn context mapper class (optional)
oidc_custom_authn_context_mapper_class.help=If issued OIDC tokens are to contain acr claims, implement the \
  <code>org.forgerock.openam.sts.rest.token.provider.oidc.OpenIdConnectTokenAuthnContextMapper</code> interface, and specify the \
  class name of the implementation here.
oidc_custom_authn_method_references_mapper_class=Custom authn methods references mapper class (optional)
oidc_custom_authn_method_references_mapper_class.help=If issued OIDC tokens are to contain amr claims, implement the \
  <code>org.forgerock.openam.sts.rest.token.provider.oidc.OpenIdConnectTokenAuthMethodReferencesMapper</code> interface, and specify the \
  class name of the implementation here.

