authchainswitch-service-description=認証連鎖分岐モジュール(親)
a500=認証レベル
a500.help=この認証モジュールで認証成功時に設定される認証レベルです。
a501=認証連鎖を判定する値が入る属性名
a501.help=ここで指定されたユーザーの属性値を認証連鎖の判定に使用します。
a502=属性が存在しない場合に動作する認証連鎖
a502.help=ユーザーの属性が存在しない場合はここで指定された認証連鎖で動作します。
a502.help.txt=認証連鎖に<code>[Empty]</code>と指定した場合は、認証連鎖を呼び出さずに認証成功となります。
a503=属性値と認証連鎖のマップ
a503.help=<code>キー</code>に<code>属性値</code>,  <code>値</code>に<code>認証連鎖</code>を設定します。
a503.help.txt=認証連鎖に<code>[Empty]</code>と指定した場合は、認証連鎖を呼び出さずに認証成功となります。
a504=セッションアップグレート時 [Empty] でも認証成功とする
a504.help=セッションアップグレート時のみに使用する設定項目です。
a504.help.txt=<code>有効</code>はセッションアップグレート時に<code>[Empty]</code>を使用できます。<br> \
<code>無効</code>はセッションアップグレート時に<code>[Empty]</code>による認証が許可されず、<code>[Empty]</code>が動作した場合は認証エラーとなります。
a505=Cookie 名
a505.help=選択画面で選んだ認証方式を保存する Cookie の名前として使用します。
a505.help.txt=保存した Cookie は次に選択画面を表示した際、以前選択した認証方式をデフォルトで選択状態とするために使用します。
a506=Cookie の有効期限
a506.help=保存する Cookie の有効期限を設定します。
a506.help.txt=単位は日数です。<code>0</code>を設定した場合は Cookie を発行しません。
a507=「属性値と認証連鎖のマップ」に無い属性値を持つユーザーは認証エラーとする
a507.help=ユーザーの属性値に「属性値と認証連鎖のマップ」で定義されていない値が一つでも存在した場合の動作を設定します。
a507.help.txt=<code>有効</code>は定義されていない値が存在すると認証エラーとなります。<br>\
<code>無効</code>は認証エラーとせず、定義されていない値を無視して処理を継続します。

choiceprompt=一覧から認証方式を選択してください。
OK=追加の認証をしない
HOTP=登録メールアドレスにワンタイムパスワードを通知
DATASTORE=ID/パスワード
LDAP=ID/パスワード
LINE=LINEにワンタイムパスワードを通知
OATH=Authenticatorのワンタイムパスワード

NullRequest=リクエスト内容が不正です。
localAuthChainError=認証連鎖が見つかりません。システム管理者に連絡してください。
invalidLoginState=ログインステート関連のエラーが発生しました。
localAuthFailed=ローカル認証に失敗しました。
SettingError=設定値が不正です。システム管理者に連絡してください。
authFailed=認証に失敗しました。
sessionUpgradeError=認証に失敗しました。追加の認証を行う必要があります。
